<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        // هذا الكود يأخذ المسار الحالي (مثل ?post=1) ويعيد توجيهك إلى الصفحة الرئيسية لنفس المستودع
        var path = window.location.pathname;
        var search = window.location.search;
        // نأخذ اسم المستودع من المسار (مثلاً /sport-blog/) ونضيف إليه علامة الاستفهام
        var repo = path.substring(0, path.lastIndexOf('/') + 1);
        window.location.href = repo + search;
    </script>
</head>
<body>
    <p>Redirecting to the blog...</p>
</body>
</html>
