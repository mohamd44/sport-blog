<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التوجيه...</title>
    <script>
        // 1. حفظ المسار المطلوب (مثلاً: ?post=1)
        sessionStorage.setItem('redirect-path', window.location.search + window.location.hash);

        // 2. التوجيه إلى الصفحة الرئيسية للمستودع
        // window.location.pathname يعطي مثلاً: /sport-blog/
        window.location.href = window.location.pathname;
    </script>
</head>
<body>
    <p>جاري التوجيه إلى المدونة...</p>
</body>
</html>
